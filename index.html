<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八字合婚测算</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: linear-gradient(135deg, #1a0a00 0%, #3d1a00 40%, #1a0a00 100%);
            min-height: 100vh;
            color: #f5e6c8;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(180,120,40,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(180,60,20,0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 标题区 */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
        }

        .header .badge {
            display: inline-block;
            background: linear-gradient(135deg, #c8860a, #e8a020);
            color: #1a0a00;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 16px;
            border-radius: 20px;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5d080, #e8a020, #f5d080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
            margin-bottom: 10px;
            text-shadow: none;
        }

        .header .subtitle {
            color: #c8a060;
            font-size: 14px;
            letter-spacing: 4px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c8860a, transparent);
        }
        .divider span {
            color: #c8860a;
            font-size: 18px;
        }

        /* 卡片 */
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(200,134,10,0.3);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c8860a, transparent);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #f5d080;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #c8860a, #e8a020);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* 两列布局 */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .two-col { grid-template-columns: 1fr; }
            .header h1 { font-size: 32px; }
        }

        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #c8a060;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(200,134,10,0.4);
            border-radius: 8px;
            padding: 10px 14px;
            color: #f5e6c8;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #c8860a;
            box-shadow: 0 0 0 3px rgba(200,134,10,0.15);
        }

        .form-group select option {
            background: #2a1000;
            color: #f5e6c8;
        }

        .date-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
        }

        .time-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* 按钮 */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #c8860a, #e8a020, #c8860a);
            background-size: 200% 100%;
            border: none;
            border-radius: 12px;
            color: #1a0a00;
            font-size: 18px;
            font-weight: 700;
            font-family: inherit;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(200,134,10,0.4);
        }

        .btn-secondary {
            padding: 12px 28px;
            background: transparent;
            border: 1px solid #c8860a;
            border-radius: 10px;
            color: #f5d080;
            font-size: 15px;
            font-family: inherit;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(200,134,10,0.2);
        }

        /* 结果区 */
        #result-section {
            display: none;
        }

        /* 评分圆圈 */
        .score-circle-wrap {
            text-align: center;
            padding: 20px 0;
        }

        .score-circle {
            width: 160px;
            height: 160px;
            margin: 0 auto 16px;
            position: relative;
        }

        .score-circle svg {
            transform: rotate(-90deg);
        }

        .score-circle .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .score-circle .score-num {
            font-size: 42px;
            font-weight: 700;
            color: #f5d080;
            line-height: 1;
        }

        .score-circle .score-unit {
            font-size: 14px;
            color: #c8a060;
        }

        .score-label {
            font-size: 22px;
            font-weight: 700;
            color: #f5d080;
            margin-bottom: 6px;
        }

        .score-desc {
            font-size: 13px;
            color: #c8a060;
        }

        /* 八字表格 */
        .bazi-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .bazi-table th {
            background: rgba(200,134,10,0.2);
            color: #f5d080;
            padding: 10px;
            font-size: 13px;
            text-align: center;
            border: 1px solid rgba(200,134,10,0.2);
        }

        .bazi-table td {
            padding: 12px 10px;
            text-align: center;
            border: 1px solid rgba(200,134,10,0.15);
            font-size: 15px;
        }

        .bazi-table tr:nth-child(even) td {
            background: rgba(255,255,255,0.03);
        }

        .tiangan { color: #f5d080; font-size: 20px; font-weight: 700; }
        .dizhi { color: #e8a060; font-size: 20px; font-weight: 700; }
        .wuxing-mu { color: #4caf50; }
        .wuxing-huo { color: #f44336; }
        .wuxing-tu { color: #ff9800; }
        .wuxing-jin { color: #9e9e9e; }
        .wuxing-shui { color: #2196f3; }

        /* 分析列表 */
        .analysis-list {
            list-style: none;
            padding: 0;
        }

        .analysis-list li {
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.8;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .analysis-list li.good {
            background: rgba(76,175,80,0.1);
            border-left: 3px solid #4caf50;
            color: #a5d6a7;
        }

        .analysis-list li.warn {
            background: rgba(255,152,0,0.1);
            border-left: 3px solid #ff9800;
            color: #ffcc80;
        }

        .analysis-list li.info {
            background: rgba(33,150,243,0.1);
            border-left: 3px solid #2196f3;
            color: #90caf9;
        }

        .analysis-list li .li-icon {
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* 建议区 */
        .suggestion-box {
            background: rgba(200,134,10,0.08);
            border: 1px solid rgba(200,134,10,0.25);
            border-radius: 12px;
            padding: 20px;
            line-height: 2;
            font-size: 14px;
            color: #e8d0a0;
        }

        /* 五行对比 */
        .wuxing-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .wuxing-bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wuxing-bar-label {
            width: 30px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
        }

        .wuxing-bar-wrap {
            flex: 1;
            display: flex;
            gap: 4px;
        }

        .wuxing-bar {
            height: 20px;
            border-radius: 4px;
            transition: width 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            min-width: 30px;
        }

        .wuxing-bar-count {
            width: 40px;
            text-align: right;
            font-size: 13px;
            color: #c8a060;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(200,160,96,0.5);
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        /* 装饰符号 */
        .deco-char {
            position: absolute;
            font-size: 120px;
            color: rgba(200,134,10,0.04);
            font-weight: 700;
            pointer-events: none;
            user-select: none;
        }

        .gender-select {
            display: flex;
            gap: 10px;
        }

        .gender-btn {
            flex: 1;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(200,134,10,0.4);
            border-radius: 8px;
            color: #c8a060;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .gender-btn.active {
            background: rgba(200,134,10,0.25);
            border-color: #c8860a;
            color: #f5d080;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 标题 -->
    <div class="header">
        <div class="badge">✦ 传统命理 ✦</div>
        <h1>八字合婚</h1>
        <div class="subtitle">天干地支 · 阴阳五行 · 姻缘测算</div>
        <div class="divider"><span>❧</span></div>
    </div>

    <!-- 输入区 -->
    <div class="two-col">

        <!-- 男方 -->
        <div class="card">
            <div class="deco-char" style="right:-20px;bottom:-30px;">乾</div>
            <div class="card-title">
                <div class="icon">♂</div>
                男方信息
            </div>
            <div class="form-group">
                <label>姓名（选填）</label>
                <input type="text" id="m-name" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>出生日期</label>
                <div class="date-row">
                    <input type="number" id="m-year" placeholder="年" min="1900" max="2100" value="1999">
                    <input type="number" id="m-month" placeholder="月" min="1" max="12" value="2">
                    <input type="number" id="m-day" placeholder="日" min="1" max="31" value="17">
                </div>
            </div>
            <div class="form-group">
                <label>出生时间</label>
                <div class="time-row">
                    <input type="number" id="m-hour" placeholder="时" min="0" max="23" value="5">
                    <input type="number" id="m-minute" placeholder="分" min="0" max="59" value="15">
                </div>
            </div>
        </div>

        <!-- 女方 -->
        <div class="card">
            <div class="deco-char" style="right:-20px;bottom:-30px;">坤</div>
            <div class="card-title">
                <div class="icon">♀</div>
                女方信息
            </div>
            <div class="form-group">
                <label>姓名（选填）</label>
                <input type="text" id="f-name" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>出生日期</label>
                <div class="date-row">
                    <input type="number" id="f-year" placeholder="年" min="1900" max="2100" value="1998">
                    <input type="number" id="f-month" placeholder="月" min="1" max="12" value="8">
                    <input type="number" id="f-day" placeholder="日" min="1" max="31" value="29">
                </div>
            </div>
            <div class="form-group">
                <label>出生时间</label>
                <div class="time-row">
                    <input type="number" id="f-hour" placeholder="时" min="0" max="23" value="6">
                    <input type="number" id="f-minute" placeholder="分" min="0" max="59" value="10">
                </div>
            </div>
        </div>

    </div>

    <button class="btn-primary" onclick="calculate()">🔮 &nbsp; 开始测算合婚</button>

    <!-- 结果区 -->
    <div id="result-section">

        <div class="divider" style="margin-top:40px;"><span>❧</span></div>

        <!-- 综合评分 -->
        <div class="card fade-in" style="margin-top:20px;">
            <div class="card-title"><div class="icon">⭐</div>综合评分</div>
            <div class="two-col" style="align-items:center;">
                <div class="score-circle-wrap">
                    <div class="score-circle">
                        <svg width="160" height="160" viewBox="0 0 160 160">
                            <circle cx="80" cy="80" r="65" fill="none" stroke="rgba(200,134,10,0.15)" stroke-width="12"/>
                            <circle id="score-arc" cx="80" cy="80" r="65" fill="none" stroke="url(#scoreGrad)" stroke-width="12"
                                stroke-linecap="round" stroke-dasharray="408" stroke-dashoffset="408"/>
                            <defs>
                                <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#c8860a"/>
                                    <stop offset="100%" style="stop-color:#f5d080"/>
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="score-text">
                            <div class="score-num" id="score-num">0</div>
                            <div class="score-unit">分</div>
                        </div>
                    </div>
                    <div class="score-label" id="score-label">—</div>
                    <div class="score-desc" id="score-desc">—</div>
                </div>
                <div>
                    <ul class="analysis-list" id="score-factors"></ul>
                </div>
            </div>
        </div>

        <!-- 八字排盘 -->
        <div class="two-col">
            <div class="card fade-in">
                <div class="card-title"><div class="icon">♂</div><span id="m-bazi-title">男方八字</span></div>
                <table class="bazi-table" id="m-bazi-table"></table>
            </div>
            <div class="card fade-in">
                <div class="card-title"><div class="icon">♀</div><span id="f-bazi-title">女方八字</span></div>
                <table class="bazi-table" id="f-bazi-table"></table>
            </div>
        </div>

        <!-- 五行分析 -->
        <div class="card fade-in">
            <div class="card-title"><div class="icon">☯</div>五行对比分析</div>
            <div class="two-col">
                <div>
                    <div style="color:#c8a060;font-size:13px;margin-bottom:10px;" id="m-wuxing-title">男方五行</div>
                    <div class="wuxing-bars" id="m-wuxing-bars"></div>
                </div>
                <div>
                    <div style="color:#c8a060;font-size:13px;margin-bottom:10px;" id="f-wuxing-title">女方五行</div>
                    <div class="wuxing-bars" id="f-wuxing-bars"></div>
                </div>
            </div>
        </div>

        <!-- 有利因素 & 注意事项 -->
        <div class="two-col">
            <div class="card fade-in">
                <div class="card-title"><div class="icon">✓</div>有利因素</div>
                <ul class="analysis-list" id="good-list"></ul>
            </div>
            <div class="card fade-in">
                <div class="card-title"><div class="icon">!</div>注意事项</div>
                <ul class="analysis-list" id="warn-list"></ul>
            </div>
        </div>

        <!-- 感情建议 -->
        <div class="card fade-in">
            <div class="card-title"><div class="icon">💝</div>感情建议</div>
            <div class="suggestion-box" id="suggestion-box"></div>
        </div>

        <div style="text-align:center;margin-top:20px;">
            <button class="btn-secondary" onclick="window.print()">🖨️ 打印 / 保存PDF</button>
        </div>

    </div>

    <div class="footer">
        ✦ 八字合婚测算 · 仅供参考 · 缘分天注定 ✦
    </div>

</div>

<script>
// ============================================================
// 八字核心数据
// ============================================================
const TIANGAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DIZHI   = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const WUXING_TG = ['木','木','火','火','土','土','金','金','水','水'];
const WUXING_DZ = ['水','土','木','木','土','火','火','土','金','金','土','水'];
const YINYANG_TG = ['阳','阴','阳','阴','阳','阴','阳','阴','阳','阴'];
const WUXING_COLOR = { '木':'#4caf50','火':'#f44336','土':'#ff9800','金':'#9e9e9e','水':'#2196f3' };
const WUXING_CLASS = { '木':'wuxing-mu','火':'wuxing-huo','土':'wuxing-tu','金':'wuxing-jin','水':'wuxing-shui' };

// 节气数据（简化版，每月节气大约日期）
const JIEQI = [
    [6,20],[4,19],[6,21],[5,20],[6,21],[6,21],
    [7,23],[7,23],[8,23],[8,23],[7,22],[7,22]
];

// 天干合
const TG_HE = {
    '甲己':true,'己甲':true,'乙庚':true,'庚乙':true,
    '丙辛':true,'辛丙':true,'丁壬':true,'壬丁':true,
    '戊癸':true,'癸戊':true
};
const TG_HE_NAME = {
    '甲己':'甲己合（中正之合）','己甲':'甲己合（中正之合）',
    '乙庚':'乙庚合（仁义之合）','庚乙':'乙庚合（仁义之合）',
    '丙辛':'丙辛合（威制之合）','辛丙':'丙辛合（威制之合）',
    '丁壬':'丁壬合（淫慝之合）','壬丁':'丁壬合（淫慝之合）',
    '戊癸':'戊癸合（无情之合）','癸戊':'戊癸合（无情之合）'
};

// 地支六合
const DZ_LIUHE = {
    '子丑':true,'丑子':true,'寅亥':true,'亥寅':true,
    '卯戌':true,'戌卯':true,'辰酉':true,'酉辰':true,
    '巳申':true,'申巳':true,'午未':true,'未午':true
};
const DZ_LIUHE_NAME = {
    '子丑':'子丑六合','丑子':'子丑六合','寅亥':'寅亥六合','亥寅':'寅亥六合',
    '卯戌':'卯戌六合','戌卯':'卯戌六合','辰酉':'辰酉六合','酉辰':'辰酉六合',
    '巳申':'巳申六合','申巳':'巳申六合','午未':'午未六合','未午':'午未六合'
};

// 地支六冲
const DZ_CHONG = {
    '子午':true,'午子':true,'丑未':true,'未丑':true,
    '寅申':true,'申寅':true,'卯酉':true,'酉卯':true,
    '辰戌':true,'戌辰':true,'巳亥':true,'亥巳':true
};
const DZ_CHONG_NAME = {
    '子午':'子午相冲','午子':'子午相冲','丑未':'丑未相冲','未丑':'丑未相冲',
    '寅申':'寅申相冲','申寅':'寅申相冲','卯酉':'卯酉相冲','酉卯':'卯酉相冲',
    '辰戌':'辰戌相冲','戌辰':'辰戌相冲','巳亥':'巳亥相冲','亥巳':'巳亥相冲'
};

// 地支三合
const DZ_SANHE = [
    {group:['申','子','辰'], name:'申子辰三合水局', wx:'水'},
    {group:['寅','午','戌'], name:'寅午戌三合火局', wx:'火'},
    {group:['巳','酉','丑'], name:'巳酉丑三合金局', wx:'金'},
    {group:['亥','卯','未'], name:'亥卯未三合木局', wx:'木'},
];

// 五行生克
const WX_SHENG = {'木':'火','火':'土','土':'金','金':'水','水':'木'};
const WX_KE   = {'木':'土','火':'金','土':'水','金':'木','水':'火'};

// ============================================================
// 节气修正月柱计算
// ============================================================
function getMonthZhu(year, month, day) {
    const jieqi = JIEQI[month-1];
    let m = month;
    if (day < jieqi[0]) m = month - 1;
    if (m <= 0) m = 12;
    // 月干 = (年干序*2 + 月) % 10
    const yearTGIdx = (year - 4) % 10;
    const monthTGIdx = (yearTGIdx * 2 + m + 1) % 10;
    // 月支从寅开始（寅=2）
    const monthDZIdx = (m + 1) % 12;
    return {
        tg: TIANGAN[monthTGIdx],
        dz: DIZHI[monthDZIdx],
        tgIdx: monthTGIdx,
        dzIdx: monthDZIdx
    };
}

function getHourZhu(dayTGIdx, hour) {
    const shichen = Math.floor((hour + 1) / 2) % 12;
    const hourTGIdx = (dayTGIdx * 2 + shichen) % 10;
    return {
        tg: TIANGAN[hourTGIdx],
        dz: DIZHI[shichen],
        tgIdx: hourTGIdx,
        dzIdx: shichen
    };
}

function calcBazi(year, month, day, hour) {
    // 年柱
    const yearTGIdx = (year - 4) % 10;
    const yearDZIdx = (year - 4) % 12;
    const yearZhu = { tg: TIANGAN[yearTGIdx], dz: DIZHI[yearDZIdx], tgIdx: yearTGIdx, dzIdx: yearDZIdx };

    // 月柱（含节气修正）
    const monthZhu = getMonthZhu(year, month, day);

    // 日柱（简化：以1900-01-01为甲子日，偏移计算）
    const base = new Date(1900, 0, 1);
    const target = new Date(year, month-1, day);
    const diff = Math.floor((target - base) / 86400000);
    const dayTGIdx = (diff % 10 + 10) % 10;
    const dayDZIdx = (diff % 12 + 12) % 12;
    const dayZhu = { tg: TIANGAN[dayTGIdx], dz: DIZHI[dayDZIdx], tgIdx: dayTGIdx, dzIdx: dayDZIdx };

    // 时柱
    const hourZhu = getHourZhu(dayTGIdx, hour);

    return [yearZhu, monthZhu, dayZhu, hourZhu];
}

function getWuxingCount(bazi) {
    const count = { '木':0, '火':0, '土':0, '金':0, '水':0 };
    for (const zhu of bazi) {
        count[WUXING_TG[zhu.tgIdx]]++;
        count[WUXING_DZ[zhu.dzIdx]]++;
    }
    return count;
}

// ============================================================
// 合婚分析
// ============================================================
function analyze(mBazi, fBazi) {
    let score = 60;
    const good = [], warn = [], factors = [];

    const mPillars = ['年','月','日','时'];
    const mTG = mBazi.map(z => z.tg);
    const mDZ = mBazi.map(z => z.dz);
    const fTG = fBazi.map(z => z.tg);
    const fDZ = fBazi.map(z => z.dz);

    // 天干合
    for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
            const key = mTG[i] + fTG[j];
            if (TG_HE[key]) {
                score += 6;
                good.push(`${mPillars[i]}柱天干 ${mTG[i]} 与女方${mPillars[j]}柱 ${fTG[j]} — ${TG_HE_NAME[key]}`);
            }
        }
    }

    // 地支六合
    for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
            const key = mDZ[i] + fDZ[j];
            if (DZ_LIUHE[key]) {
                score += 5;
                good.push(`${mPillars[i]}柱地支 ${mDZ[i]} 与女方${mPillars[j]}柱 ${fDZ[j]} — ${DZ_LIUHE_NAME[key]}`);
            }
        }
    }

    // 地支六冲
    for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
            const key = mDZ[i] + fDZ[j];
            if (DZ_CHONG[key]) {
                score -= 5;
                warn.push(`${mPillars[i]}柱地支 ${mDZ[i]} 与女方${mPillars[j]}柱 ${fDZ[j]} — ${DZ_CHONG_NAME[key]}，需多包容`);
            }
        }
    }

    // 三合
    const allDZ = [...mDZ, ...fDZ];
    for (const sh of DZ_SANHE) {
        const cnt = sh.group.filter(d => allDZ.includes(d)).length;
        if (cnt >= 2) {
            score += cnt * 4;
            good.push(`两人合盘出现${sh.name}，五行${sh.wx}气旺盛，感情稳固`);
        }
    }

    // 五行生克（日主）
    const mDayWX = WUXING_TG[mBazi[2].tgIdx];
    const fDayWX = WUXING_TG[fBazi[2].tgIdx];

    if (WX_SHENG[fDayWX] === mDayWX) {
        score += 8;
        good.push(`女方日主${fDayWX}生男方日主${mDayWX}，女方是男方贵人，相互扶持`);
    } else if (WX_SHENG[mDayWX] === fDayWX) {
        score += 6;
        good.push(`男方日主${mDayWX}生女方日主${fDayWX}，男方呵护女方，感情温暖`);
    } else if (WX_KE[mDayWX] === fDayWX) {
        score -= 4;
        warn.push(`男方日主${mDayWX}克女方日主${fDayWX}，需注意相处方式，避免控制欲过强`);
    } else if (WX_KE[fDayWX] === mDayWX) {
        score -= 4;
        warn.push(`女方日主${fDayWX}克男方日主${mDayWX}，女方性格较强势，需注意平衡`);
    } else {
        score += 3;
        good.push(`两人日主五行（${mDayWX}、${fDayWX}）相比和，性格互补`);
    }

    // 五行互补
    const mWX = getWuxingCount(mBazi);
    const fWX = getWuxingCount(fBazi);
    let complement = 0;
    for (const wx of ['木','火','土','金','水']) {
        if (mWX[wx] === 0 && fWX[wx] > 0) complement++;
        if (fWX[wx] === 0 && mWX[wx] > 0) complement++;
    }
    if (complement >= 2) {
        score += complement * 2;
        good.push(`两人五行互补（互补${complement}项），相互弥补不足，天作之合`);
    }

    score = Math.max(30, Math.min(98, score));

    return { score: Math.round(score), good, warn };
}

function getScoreInfo(score) {
    if (score >= 90) return { label: '❤️ 天作之合', desc: '两人缘分极深，命中注定的伴侣', color: '#f44336' };
    if (score >= 80) return { label: '💛 良缘佳配', desc: '八字相合，感情和睦，婚姻美满', color: '#ff9800' };
    if (score >= 70) return { label: '💚 缘分尚可', desc: '两人有缘，相处融洽，需共同经营', color: '#4caf50' };
    if (score >= 60) return { label: '💙 平淡有缘', desc: '缘分一般，需要更多包容与理解', color: '#2196f3' };
    return { label: '🤍 缘分尚浅', desc: '八字相克较多，需谨慎经营感情', color: '#9e9e9e' };
}

function getSuggestion(score, mBazi, fBazi) {
    const mDayWX = WUXING_TG[mBazi[2].tgIdx];
    const fDayWX = WUXING_TG[fBazi[2].tgIdx];
    const info = getScoreInfo(score);

    const suggestions = [
        `根据两人的八字合盘分析，综合评分为 ${score} 分，${info.label}。`,
        ``,
        `男方日主为${mDayWX}，性格${mDayWX==='木'?'正直进取':mDayWX==='火'?'热情开朗':mDayWX==='土'?'稳重踏实':mDayWX==='金'?'果断刚毅':'智慧灵活'}；`,
        `女方日主为${fDayWX}，性格${fDayWX==='木'?'温柔善良':fDayWX==='火'?'活泼热情':fDayWX==='土'?'贤惠包容':fDayWX==='金'?'独立坚强':'聪慧细腻'}。`,
        ``,
        score >= 80
            ? `两人八字相合度高，感情基础扎实。建议珍惜这段缘分，在生活中多沟通、多理解，共同规划未来，婚姻生活将会幸福美满。`
            : score >= 65
            ? `两人八字有合有冲，感情需要用心经营。建议多培养共同爱好，在分歧时保持冷静沟通，互相尊重对方的个性，感情将会越来越稳固。`
            : `两人八字存在一定冲克，但缘分天注定，后天努力同样重要。建议多包容对方的不足，遇到矛盾时以平和的心态处理，共同成长。`,
        ``,
        `✦ 命理仅供参考，真正的幸福需要两人共同用心经营。`
    ];
    return suggestions.join('<br>');
}

// ============================================================
// 渲染函数
// ============================================================
function renderBaziTable(tableId, bazi) {
    const table = document.getElementById(tableId);
    const pillars = ['年柱','月柱','日柱','时柱'];
    let html = `<thead><tr>
        <th>柱</th><th>天干</th><th>地支</th><th>天干五行</th><th>地支五行</th>
    </tr></thead><tbody>`;
    for (let i = 0; i < 4; i++) {
        const z = bazi[i];
        const tgWX = WUXING_TG[z.tgIdx];
        const dzWX = WUXING_DZ[z.dzIdx];
        html += `<tr>
            <td style="color:#c8a060;font-size:13px;">${pillars[i]}</td>
            <td class="tiangan">${z.tg}</td>
            <td class="dizhi">${z.dz}</td>
            <td class="${WUXING_CLASS[tgWX]}">${tgWX}</td>
            <td class="${WUXING_CLASS[dzWX]}">${dzWX}</td>
        </tr>`;
    }
    html += '</tbody>';
    table.innerHTML = html;
}

function renderWuxingBars(containerId, wxCount) {
    const container = document.getElementById(containerId);
    const total = Object.values(wxCount).reduce((a,b)=>a+b,0);
    const wxList = ['木','火','土','金','水'];
    let html = '';
    for (const wx of wxList) {
        const cnt = wxCount[wx];
        const pct = total > 0 ? (cnt / total * 100).toFixed(0) : 0;
        html += `<div class="wuxing-bar-row">
            <div class="wuxing-bar-label" style="color:${WUXING_COLOR[wx]}">${wx}</div>
            <div class="wuxing-bar-wrap">
                <div class="wuxing-bar" style="width:${pct}%;background:${WUXING_COLOR[wx]};">${cnt>0?cnt:''}</div>
            </div>
            <div class="wuxing-bar-count">${cnt}个</div>
        </div>`;
    }
    container.innerHTML = html;
}

function renderScoreCircle(score) {
    const circumference = 408;
    const offset = circumference - (score / 100) * circumference;
    const arc = document.getElementById('score-arc');
    arc.style.strokeDashoffset = circumference;
    setTimeout(() => {
        arc.style.transition = 'stroke-dashoffset 1.2s ease';
        arc.style.strokeDashoffset = offset;
    }, 100);

    // 数字动画
    const numEl = document.getElementById('score-num');
    let current = 0;
    const step = score / 60;
    const timer = setInterval(() => {
        current = Math.min(current + step, score);
        numEl.textContent = Math.round(current);
        if (current >= score) clearInterval(timer);
    }, 16);
}

// ============================================================
// 主计算函数
// ============================================================
function calculate() {
    const mName = document.getElementById('m-name').value || '男方';
    const fName = document.getElementById('f-name').value || '女方';
    const mYear = parseInt(document.getElementById('m-year').value);
    const mMonth = parseInt(document.getElementById('m-month').value);
    const mDay = parseInt(document.getElementById('m-day').value);
    const mHour = parseInt(document.getElementById('m-hour').value);

    const fYear = parseInt(document.getElementById('f-year').value);
    const fMonth = parseInt(document.getElementById('f-month').value);
    const fDay = parseInt(document.getElementById('f-day').value);
    const fHour = parseInt(document.getElementById('f-hour').value);

    if (!mYear||!mMonth||!mDay||!fYear||!fMonth||!fDay) {
        alert('请填写完整的出生日期！');
        return;
    }

    // 计算八字
    const mBazi = calcBazi(mYear, mMonth, mDay, mHour);
    const fBazi = calcBazi(fYear, fMonth, fDay, fHour);

    // 分析
    const result = analyze(mBazi, fBazi);
    const scoreInfo = getScoreInfo(result.score);

    // 更新标题
    document.getElementById('m-bazi-title').textContent = `${mName}的八字`;
    document.getElementById('f-bazi-title').textContent = `${fName}的八字`;
    document.getElementById('m-wuxing-title').textContent = `${mName}五行`;
    document.getElementById('f-wuxing-title').textContent = `${fName}五行`;

    // 渲染评分
    renderScoreCircle(result.score);
    document.getElementById('score-label').textContent = scoreInfo.label;
    document.getElementById('score-desc').textContent = scoreInfo.desc;

    // 评分因素
    const factors = document.getElementById('score-factors');
    factors.innerHTML = `
        <li class="good"><span class="li-icon">✅</span>有利因素：${result.good.length} 项</li>
        <li class="warn"><span class="li-icon">⚠️</span>注意事项：${result.warn.length} 项</li>
        <li class="info"><span class="li-icon">ℹ️</span>综合评级：${scoreInfo.label}</li>
    `;

    // 渲染八字表
    renderBaziTable('m-bazi-table', mBazi);
    renderBaziTable('f-bazi-table', fBazi);

    // 五行
    renderWuxingBars('m-wuxing-bars', getWuxingCount(mBazi));
    renderWuxingBars('f-wuxing-bars', getWuxingCount(fBazi));

    // 有利因素
    const goodList = document.getElementById('good-list');
    goodList.innerHTML = result.good.length > 0
        ? result.good.map(g => `<li class="good"><span class="li-icon">✦</span>${g}</li>`).join('')
        : '<li class="info"><span class="li-icon">ℹ️</span>暂无明显有利因素</li>';

    // 注意事项
    const warnList = document.getElementById('warn-list');
    warnList.innerHTML = result.warn.length > 0
        ? result.warn.map(w => `<li class="warn"><span class="li-icon">⚠</span>${w}</li>`).join('')
        : '<li class="good"><span class="li-icon">✦</span>暂无明显冲克，整体和谐</li>';

    // 建议
    document.getElementById('suggestion-box').innerHTML = getSuggestion(result.score, mBazi, fBazi);

    // 显示结果
    const resultSection = document.getElementById('result-section');
    resultSection.style.display = 'block';
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
